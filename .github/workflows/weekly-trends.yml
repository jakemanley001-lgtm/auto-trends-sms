name: Weekly Auto Trends SMS

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  send-trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytrends requests
      - name: Run trends script
        run: python trends_sms.py
